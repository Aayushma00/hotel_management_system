version: "3.9"
services:
  backend:
    build: ./backend
    environment:
      - PORT=4000
      - JWT_SECRET=change_me
      - DB_PATH=/app/data/hms.sqlite
      - ML_BASE_URL=http://ml:5001
    volumes:
      - backend_data:/app/data
    ports:
      - "4000:4000"
    depends_on:
      - ml

  ml:
    build: ./ml_service
    environment:
      - PORT=5001
    ports:
      - "5001:5001"

  frontend:
    build: ./frontend
    environment:
      - VITE_API_BASE=http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:
